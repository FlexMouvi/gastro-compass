{% extends "main/base.html" %}

{% block title %}Вход - Gastro COMPASS{% endblock %}

{% block content %}
<div class="container mt-5" style="max-width: 500px;">
    <div class="card">
        <div class="card-body">
            <h2 class="text-center mb-4">Вход</h2>
            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn btn-primary w-100">Войти</button>
            </form>
            <p class="mt-3 text-center">Нет аккаунта? <a href="{% url 'register' %}">Зарегистрируйтесь</a></p>
        </div>
    </div>
</div>
{% endblock %}
